version: 1
interface:
  display_name: Screen Commander
  short_description: Capture Chrome bug reproductions and turn them into structured session artifacts.
  default_prompt: Default to direct start for Screen Commander instead of running a readiness checklist first. Set the current workspace as the target project unless the user explicitly overrides it, keep saved transcription preferences by default, and enter blocking watch mode immediately so the current thread waits for the next finalized session and then continues from those artifacts in-thread. When the user is ready to start browser recording, send one visually prominent but very short bold reminder before waiting, and adapt the shortcuts to the user's platform: use `Option+S` and `Option+E` on macOS, and `Alt+S` and `Alt+E` on Windows or Linux. Only diagnose extension/native-host readiness with local repair steps if recording actually fails to start or stop, or if the user explicitly asks to troubleshoot first. Do not rely on a detached background Codex CLI task unless the user explicitly asks for a background run.
