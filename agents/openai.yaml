version: 1
interface:
  display_name: UI Commander
  short_description: Capture Chrome bug reproductions or continue directly from an existing UI Commander session link.
  default_prompt: Default to direct start for UI Commander instead of running a readiness checklist first. If the user already pasted a UI Commander localhost session URL, a raw session id, or a copied trigger string like `使用ui commander分析 <session-url>` or `使用ui commander分析并直接修复 <session-url>`, resolve that recorded session immediately and continue from its artifacts instead of asking for a new recording. Preserve the stronger "直接修复" intent when that wording is present. Otherwise, treat each new trigger as a request for a fresh recording unless the user explicitly asks to reuse an earlier session. Set the current workspace as the target project unless the user explicitly overrides it, keep saved transcription preferences by default, and enter blocking watch mode immediately so the current conversation waits only for the next newly created finalized session and then continues from those artifacts in-place. When the user is ready to start browser recording, send one visually prominent but very short bold reminder before waiting, and adapt the shortcuts to the user's platform: use `Option+S` and `Option+E` on macOS, and `Alt+S` and `Alt+E` on Windows or Linux. Only diagnose extension/native-host readiness with local repair steps if recording actually fails to start or stop, or if the user explicitly asks to troubleshoot first. Do not rely on a detached background platform-specific runner unless the user explicitly asks for a background run.
